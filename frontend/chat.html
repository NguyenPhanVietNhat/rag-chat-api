<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocMind — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080c14;--surface:#0f1623;--surface2:#131d2e;
  --border:#1e2d45;--accent:#3b82f6;--accent2:#06b6d4;
  --text:#e2e8f0;--muted:#64748b;--success:#10b981;--error:#ef4444;
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:20px 16px;
  overflow-y:auto;
}
.logo{display:flex;align-items:center;gap:8px;padding:4px 8px;margin-bottom:24px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
.logo-text span{color:var(--accent)}

.nav-btn{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:500;
  color:var(--muted);transition:all .18s;text-decoration:none;margin-bottom:4px;
}
.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-btn.active{background:rgba(59,130,246,.12);color:var(--accent)}
.nav-icon{font-size:1rem;width:20px;text-align:center}

.sidebar-section{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:16px 12px 8px}

.session-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:8px;cursor:pointer;font-size:.83rem;
  color:var(--muted);transition:all .15s;
}
.session-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.session-item.active{background:rgba(59,130,246,.1);color:var(--accent)}
.session-del{opacity:0;font-size:.8rem;padding:2px 6px;border-radius:5px;background:rgba(239,68,68,.15);color:#f87171;border:none;cursor:pointer}
.session-item:hover .session-del{opacity:1}

.new-session{
  margin-top:8px;width:100%;padding:9px;
  background:transparent;border:1px dashed var(--border);border-radius:8px;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.83rem;
  cursor:pointer;transition:all .2s;
}
.new-session:hover{border-color:var(--accent);color:var(--accent)}

.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 8px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.user-name{font-size:.85rem;font-weight:500}
.user-role{font-size:.73rem;color:var(--muted)}
.logout-btn{margin-top:8px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--error);color:#f87171}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topbar{
  padding:16px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,12,20,.8);backdrop-filter:blur(10px);flex-shrink:0;
}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.topbar-meta{font-size:.8rem;color:var(--muted)}
.upload-link{font-size:.82rem;color:var(--accent);text-decoration:none;padding:7px 14px;border:1px solid rgba(59,130,246,.3);border-radius:8px;transition:all .2s}
.upload-link:hover{background:rgba(59,130,246,.1)}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:20px}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:16px;opacity:.6;
}
.empty-icon{font-size:3rem}
.empty-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700}
.empty-sub{font-size:.88rem;color:var(--muted);max-width:320px;line-height:1.6}

.msg{display:flex;gap:12px;animation:msgIn .3s cubic-bezier(.16,1,.3,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}

.msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;margin-top:2px}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg.assistant .msg-avatar{background:var(--surface2);border:1px solid var(--border)}

.msg-body{max-width:72%}
.msg-bubble{
  padding:13px 17px;border-radius:14px;font-size:.92rem;line-height:1.65;
}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}

.msg-sources{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.source-tag{
  font-size:.75rem;padding:4px 10px;background:rgba(59,130,246,.08);
  border:1px solid rgba(59,130,246,.2);border-radius:20px;color:#93c5fd;
}

.msg-meta{font-size:.72rem;color:var(--muted);margin-top:5px;padding:0 4px}
.msg.user .msg-meta{text-align:right}

/* TYPING */
.typing-dots{display:flex;gap:5px;padding:6px 0}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* INPUT BAR */
.input-bar{
  padding:16px 28px 20px;border-top:1px solid var(--border);
  background:rgba(8,12,20,.8);backdrop-filter:blur(10px);flex-shrink:0;
}
.input-wrap{display:flex;gap:12px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.93rem;
  resize:none;max-height:160px;line-height:1.5;
}
textarea::placeholder{color:var(--muted)}
.send-btn{
  width:38px;height:38px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s;
}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-hint{font-size:.75rem;color:var(--muted);margin-top:8px;padding:0 4px}
</style>
</head>
<body>
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">📄</div>
    <div class="logo-text">Doc<span>Mind</span></div>
  </div>

  <a href="chat.html"  class="nav-btn active"><span class="nav-icon">💬</span>Chat</a>
  <a href="upload.html" class="nav-btn"><span class="nav-icon">📤</span>Upload tài liệu</a>
  <div id="admin-link" style="display:none">
    <a href="admin.html" class="nav-btn"><span class="nav-icon">⚙️</span>Quản trị</a>
  </div>

  <div class="sidebar-section">Lịch sử chat</div>
  <div id="session-list"></div>
  <button class="new-session" onclick="newSession()">+ Cuộc hội thoại mới</button>

  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="avatar" id="avatar-text">U</div>
      <div>
        <div class="user-name" id="uname">—</div>
        <div class="user-role" id="urole">user</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="session-title">Cuộc hội thoại mới</div>
      <div class="topbar-meta" id="session-meta">Đặt câu hỏi về tài liệu của bạn</div>
    </div>
    <a href="upload.html" class="upload-link">📤 Upload tài liệu</a>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Hỏi đáp tài liệu</div>
      <div class="empty-sub">Upload tài liệu, sau đó đặt câu hỏi — AI sẽ trả lời dựa trên nội dung tài liệu của bạn</div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" placeholder="Đặt câu hỏi về tài liệu..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Enter để gửi · Shift+Enter xuống dòng</div>
  </div>
</main>

<script>
const API = 'http://localhost:8000';
let token = localStorage.getItem('token');
let currentSession = null;
let sessions = {};
let isLoading = false;

// Auth guard
if (!token) window.location.href = 'index.html';

// Init user info
const user = JSON.parse(localStorage.getItem('user') || '{}');
document.getElementById('uname').textContent = user.username || '—';
document.getElementById('urole').textContent = user.role || 'user';
document.getElementById('avatar-text').textContent = (user.username||'U')[0].toUpperCase();
if (user.role === 'admin') document.getElementById('admin-link').style.display = '';

function logout() {
  localStorage.clear();
  window.location.href = 'index.html';
}

function headers() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function newSession() {
  currentSession = 'session-' + Date.now();
  sessions[currentSession] = { title: 'Cuộc hội thoại mới', messages: [] };
  renderMessages();
  updateSessionList();
  document.getElementById('session-title').textContent = 'Cuộc hội thoại mới';
  document.getElementById('session-meta').textContent = 'Đặt câu hỏi về tài liệu của bạn';
}

async function switchSession(sid) {
  currentSession = sid;
  document.getElementById('session-title').textContent = sessions[sid]?.title || 'Chat';
  // Nếu chưa có messages trong RAM → load từ server
  if (!sessions[sid]?.messages?.length) {
    try {
      const res = await fetch(`${API}/sessions/${sid}/messages`, { headers: headers() });
      if (res.ok) {
        const data = await res.json();
        sessions[sid] = sessions[sid] || { title: sessions[sid]?.title || 'Chat', messages: [] };
        sessions[sid].messages = data.messages.map(m => ({ role: m.role, content: m.content }));
      }
    } catch {}
  }
  renderMessages();
  updateSessionList();
}

async function deleteSession(sid, e) {
  e.stopPropagation();
  try {
    await fetch(`${API}/sessions/${sid}`, { method: 'DELETE', headers: headers() });
  } catch {}
  delete sessions[sid];
  if (currentSession === sid) newSession();
  else updateSessionList();
}

async function loadSessionsFromServer() {
  try {
    const res = await fetch(`${API}/sessions`, { headers: headers() });
    if (!res.ok) { newSession(); return; }
    const data = await res.json();
    const list = data.sessions || [];

    if (list.length === 0) {
      newSession();
      return;
    }

    // Load danh sách sessions (server đã trả về short ID)
    for (const s of list) {
      const sid = s.session_id;
      if (!sessions[sid]) {
        sessions[sid] = { title: s.title || 'Chat', messages: [] };
      }
    }

    // Set currentSession = session mới nhất
    currentSession = list[0].session_id;
    document.getElementById('session-title').textContent = sessions[currentSession]?.title || 'Chat';
    updateSessionList();

    // Load messages của session mới nhất
    await switchSession(currentSession);

  } catch(e) { newSession(); }
}

function updateSessionList() {
  const list = document.getElementById('session-list');
  const keys = Object.keys(sessions);
  list.innerHTML = keys.length === 0
    ? '<div style="font-size:.78rem;color:var(--muted);padding:6px 12px">Chưa có hội thoại</div>'
    : keys.map(sid => `
      <div class="session-item ${sid === currentSession ? 'active' : ''}" onclick="switchSession('${sid}')">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sessions[sid]?.title || 'Chat'}</span>
        <button class="session-del" onclick="deleteSession('${sid}',event)">✕</button>
      </div>`).join('');
}

function renderMessages() {
  const msgs = sessions[currentSession]?.messages || [];
  const el = document.getElementById('messages');
  if (msgs.length === 0) {
    el.innerHTML = `<div class="empty-state" id="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Hỏi đáp tài liệu</div>
      <div class="empty-sub">Upload tài liệu, sau đó đặt câu hỏi — AI sẽ trả lời dựa trên nội dung tài liệu của bạn</div>
    </div>`;
    return;
  }
  el.innerHTML = msgs.map(m => buildMsgHTML(m)).join('');
  el.scrollTop = el.scrollHeight;
}

function buildMsgHTML(m) {
  const isUser = m.role === 'user';
  const avatarContent = isUser ? (user.username||'U')[0].toUpperCase() : '🤖';
  const sources = (!isUser && m.sources?.length) ? `
    <div class="msg-sources">
      ${m.sources.map(s => `<span class="source-tag">📄 ${s.file}${s.page ? ', tr.'+s.page : ''}</span>`).join('')}
    </div>` : '';
  const meta = (!isUser && m.elapsed_ms) ? `<div class="msg-meta">${(m.elapsed_ms/1000).toFixed(1)}s · ${m.retrieved||0} chunks</div>` : '';
  return `<div class="msg ${m.role}">
    <div class="msg-avatar">${avatarContent}</div>
    <div class="msg-body">
      <div class="msg-bubble">${m.content.replace(/\n/g,'<br/>')}</div>
      ${sources}${meta}
    </div>
  </div>`;
}

function addTyping() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing-msg';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-body"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function removeTyping() { document.getElementById('typing-msg')?.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const inp = document.getElementById('input');
  const q = inp.value.trim();
  if (!q) return;

  // Hide empty state
  document.getElementById('empty')?.remove();

  // Init session
  if (!sessions[currentSession]) sessions[currentSession] = { title: q.slice(0,28), messages: [] };

  // Add user msg
  sessions[currentSession].messages.push({ role:'user', content:q });
  renderMessages();
  inp.value = ''; inp.style.height = 'auto';

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ question: q, session_id: currentSession })
    });
    const data = await res.json();
    removeTyping();

    if (!res.ok) throw new Error(data.detail || 'Lỗi server');

    sessions[currentSession].messages.push({
      role: 'assistant',
      content: data.answer,
      sources: data.sources,
      elapsed_ms: data.elapsed_ms,
      retrieved: data.retrieved
    });

    // Update session title
    if (sessions[currentSession].title === q.slice(0,28) || sessions[currentSession].title === 'Cuộc hội thoại mới') {
      const title = q.slice(0,28) + (q.length>28?'…':'');
      sessions[currentSession].title = title;
      document.getElementById('session-title').textContent = title;
    }

    renderMessages();
    updateSessionList();
  } catch(e) {
    removeTyping();
    sessions[currentSession].messages.push({ role:'assistant', content:`❌ Lỗi: ${e.message}` });
    renderMessages();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

// Init
loadSessionsFromServer();
</script>
</body>
</html>
