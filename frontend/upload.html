<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocMind — Upload tài liệu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080c14;--surface:#0f1623;--surface2:#131d2e;
  --border:#1e2d45;--accent:#3b82f6;--accent2:#06b6d4;
  --text:#e2e8f0;--muted:#64748b;--success:#10b981;--error:#ef4444;
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 16px;overflow-y:auto}
.logo{display:flex;align-items:center;gap:8px;padding:4px 8px;margin-bottom:24px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
.logo-text span{color:var(--accent)}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--muted);transition:all .18s;text-decoration:none;margin-bottom:4px}
.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-btn.active{background:rgba(59,130,246,.12);color:var(--accent)}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 8px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.user-name{font-size:.85rem;font-weight:500}
.user-role{font-size:.73rem;color:var(--muted)}
.logout-btn{margin-top:8px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--error);color:#f87171}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(8,12,20,.8);backdrop-filter:blur(10px);flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem}
.topbar-sub{font-size:.82rem;color:var(--muted);margin-top:3px}

.content{flex:1;overflow-y:auto;padding:32px 36px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* DROPZONE */
.dropzone{
  border:2px dashed var(--border);border-radius:16px;
  padding:56px 32px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--surface);
  position:relative;overflow:hidden;
}
.dropzone:hover,.dropzone.dragover{border-color:var(--accent);background:rgba(59,130,246,.04)}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz-icon{font-size:3rem;margin-bottom:16px;display:block}
.dz-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:8px}
.dz-sub{color:var(--muted);font-size:.88rem;line-height:1.6}
.dz-formats{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.fmt-badge{font-size:.73rem;padding:4px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;color:var(--muted)}

/* QUEUE */
.queue{margin-top:28px;display:flex;flex-direction:column;gap:12px}
.queue-item{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  animation:slideIn .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.qi-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.qi-icon.pdf{background:rgba(239,68,68,.15)}
.qi-icon.docx{background:rgba(59,130,246,.15)}
.qi-icon.xlsx{background:rgba(16,185,129,.15)}
.qi-icon.txt{background:rgba(148,163,184,.12)}
.qi-info{flex:1;min-width:0}
.qi-name{font-size:.9rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi-size{font-size:.77rem;color:var(--muted);margin-top:2px}
.qi-status{font-size:.78rem;font-weight:500;padding:4px 10px;border-radius:20px;flex-shrink:0}
.qi-status.pending{background:rgba(148,163,184,.12);color:var(--muted)}
.qi-status.uploading{background:rgba(59,130,246,.12);color:#93c5fd;animation:pulse 1.2s ease-in-out infinite}
.qi-status.done{background:rgba(16,185,129,.12);color:#6ee7b7}
.qi-status.error{background:rgba(239,68,68,.12);color:#fca5a5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.qi-remove{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px;border-radius:6px;transition:all .15s}
.qi-remove:hover{background:rgba(239,68,68,.15);color:#f87171}

.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}

/* DOC LIST */
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin:36px 0 16px;display:flex;align-items:center;justify-content:space-between}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.doc-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;transition:border-color .2s;
}
.doc-card:hover{border-color:rgba(59,130,246,.3)}
.dc-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.dc-icon{width:36px;height:36px;border-radius:8px;background:rgba(59,130,246,.12);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.dc-name{font-size:.88rem;font-weight:500;line-height:1.4;word-break:break-all}
.dc-meta{font-size:.75rem;color:var(--muted);margin-top:3px}
.dc-footer{display:flex;align-items:center;justify-content:space-between}
.dc-type{font-size:.72rem;padding:3px 8px;background:rgba(255,255,255,.05);border-radius:20px;color:var(--muted)}
.dc-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;padding:4px 8px;border-radius:6px;transition:all .15s}
.dc-del:hover{background:rgba(239,68,68,.12);color:#f87171}

.upload-btn{
  margin-top:20px;padding:12px 28px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;
  font-size:.92rem;font-weight:600;cursor:pointer;transition:opacity .2s;
}
.upload-btn:hover{opacity:.85}
.upload-btn:disabled{opacity:.4;cursor:not-allowed}

.empty-docs{text-align:center;padding:32px;color:var(--muted);font-size:.88rem}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">📄</div>
    <div class="logo-text">Doc<span>Mind</span></div>
  </div>
  <a href="chat.html"   class="nav-btn"><span class="nav-icon">💬</span>Chat</a>
  <a href="upload.html" class="nav-btn active"><span class="nav-icon">📤</span>Upload tài liệu</a>
  <div id="admin-link" style="display:none">
    <a href="admin.html" class="nav-btn"><span class="nav-icon">⚙️</span>Quản trị</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="avatar" id="avatar-text">U</div>
      <div>
        <div class="user-name" id="uname">—</div>
        <div class="user-role" id="urole">user</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-title">📤 Upload tài liệu</div>
    <div class="topbar-sub">Thêm tài liệu để AI có thể hỏi đáp</div>
  </div>

  <div class="content">
    <!-- Dropzone -->
    <div class="dropzone" id="dropzone"
      ondragover="e=>e.preventDefault()" ondrop="handleDrop(event)"
      ondragenter="this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')">
      <input type="file" id="file-input" multiple accept=".pdf,.docx,.doc,.xlsx,.xls,.txt,.md" onchange="handleFiles(this.files)"/>
      <span class="dz-icon">☁️</span>
      <div class="dz-title">Kéo thả file hoặc click để chọn</div>
      <div class="dz-sub">Hỗ trợ đa file — tối đa 50 MB mỗi file</div>
      <div class="dz-formats">
        <span class="fmt-badge">PDF</span>
        <span class="fmt-badge">DOCX</span>
        <span class="fmt-badge">XLSX</span>
        <span class="fmt-badge">TXT</span>
        <span class="fmt-badge">MD</span>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue" id="queue"></div>

    <button class="upload-btn" id="upload-btn" onclick="uploadAll()" style="display:none">
      ⬆️ Upload tất cả
    </button>

    <!-- Existing docs -->
    <div class="section-title">
      <span>📚 Tài liệu đã index</span>
      <button onclick="loadDocs()" style="background:transparent;border:none;color:var(--accent);cursor:pointer;font-size:.82rem">↻ Làm mới</button>
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="empty-docs">Đang tải...</div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:8000';
let token = localStorage.getItem('token');
if (!token) window.location.href = 'index.html';

const user = JSON.parse(localStorage.getItem('user') || '{}');
document.getElementById('uname').textContent = user.username || '—';
document.getElementById('urole').textContent = user.role || 'user';
document.getElementById('avatar-text').textContent = (user.username||'U')[0].toUpperCase();
if (user.role === 'admin') document.getElementById('admin-link').style.display = '';
function logout(){ localStorage.clear(); window.location.href='index.html'; }
function headers(){ return { 'Authorization': `Bearer ${token}` }; }

let queue = []; // {file, id, status, progress}

function fmtSize(b){ if(b<1024)return b+'B'; if(b<1048576)return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function fileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  if(ext==='pdf') return '📕';
  if(['docx','doc'].includes(ext)) return '📘';
  if(['xlsx','xls'].includes(ext)) return '📗';
  return '📄';
}
function fileClass(name){
  const ext = name.split('.').pop().toLowerCase();
  if(ext==='pdf') return 'pdf';
  if(['docx','doc'].includes(ext)) return 'docx';
  if(['xlsx','xls'].includes(ext)) return 'xlsx';
  return 'txt';
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}

function handleFiles(files){
  for(const f of files){
    const id = 'f-'+Date.now()+Math.random();
    queue.push({file:f, id, status:'pending', progress:0, result:null});
  }
  renderQueue();
  document.getElementById('upload-btn').style.display = queue.some(q=>q.status==='pending') ? '' : 'none';
}

function removeFromQueue(id){
  queue = queue.filter(q=>q.id!==id);
  renderQueue();
  document.getElementById('upload-btn').style.display = queue.some(q=>q.status==='pending') ? '' : 'none';
}

function renderQueue(){
  const el = document.getElementById('queue');
  if(!queue.length){ el.innerHTML=''; return; }
  el.innerHTML = queue.map(item => `
    <div class="queue-item" id="${item.id}">
      <div class="qi-icon ${fileClass(item.file.name)}">${fileIcon(item.file.name)}</div>
      <div class="qi-info">
        <div class="qi-name">${item.file.name}</div>
        <div class="qi-size">${fmtSize(item.file.size)}</div>
        ${item.status==='uploading'?`<div class="progress-bar"><div class="progress-fill" style="width:${item.progress}%"></div></div>`:''}
        ${item.result?`<div style="font-size:.75rem;color:var(--muted);margin-top:4px">${item.result}</div>`:''}
      </div>
      <span class="qi-status ${item.status}">${{pending:'Chờ upload',uploading:'Đang tải...',done:'✓ Hoàn thành',error:'✕ Lỗi'}[item.status]}</span>
      ${item.status==='pending'?`<button class="qi-remove" onclick="removeFromQueue('${item.id}')">✕</button>`:''}
    </div>
  `).join('');
}

async function uploadAll(){
  const pending = queue.filter(q=>q.status==='pending');
  if(!pending.length) return;
  document.getElementById('upload-btn').disabled = true;

  for(const item of pending){
    item.status = 'uploading'; item.progress = 10;
    renderQueue();
    try{
      const fd = new FormData();
      fd.append('file', item.file);
      const xhr = new XMLHttpRequest();
      await new Promise((res,rej)=>{
        xhr.upload.onprogress = e => {
          if(e.lengthComputable){ item.progress = Math.round(e.loaded/e.total*85); renderQueue(); }
        };
        xhr.onload = ()=>{
          const data = JSON.parse(xhr.responseText);
          if(xhr.status===200){
            item.status='done'; item.progress=100;
            item.result = `${data.chunks_added} chunks · ${data.token_count} tokens`;
          } else {
            item.status='error'; item.result = data.detail || 'Upload thất bại';
          }
          res();
        };
        xhr.onerror = ()=>{ item.status='error'; item.result='Lỗi kết nối'; rej(); };
        xhr.open('POST', `${API}/docs/upload`);
        xhr.setRequestHeader('Authorization', `Bearer ${token}`);
        xhr.send(fd);
      });
    } catch(e){ item.status='error'; item.result=e.message; }
    renderQueue();
  }

  document.getElementById('upload-btn').disabled = false;
  document.getElementById('upload-btn').style.display = queue.some(q=>q.status==='pending') ? '' : 'none';
  loadDocs();
}

async function loadDocs(){
  const grid = document.getElementById('doc-grid');
  grid.innerHTML = '<div class="empty-docs">Đang tải...</div>';
  try{
    const res = await fetch(`${API}/docs`, { headers: {'Authorization':`Bearer ${token}`} });
    const data = await res.json();
    const docs = data.documents || [];
    if(!docs.length){ grid.innerHTML='<div class="empty-docs">Chưa có tài liệu nào. Hãy upload tài liệu đầu tiên!</div>'; return; }
    grid.innerHTML = docs.map(d => `
      <div class="doc-card">
        <div class="dc-header">
          <div class="dc-icon">${fileIcon(d.source_file)}</div>
          <div>
            <div class="dc-name">${d.source_file}</div>
            <div class="dc-meta">${d.created_at ? new Date(d.created_at).toLocaleDateString('vi-VN') : ''}</div>
          </div>
        </div>
        <div class="dc-footer">
          <span class="dc-type">${d.doc_type||'document'}</span>
          <button class="dc-del" onclick="deleteDoc('${d.doc_id}','${d.source_file}')">🗑 Xoá</button>
        </div>
      </div>`).join('');
  } catch(e){
    grid.innerHTML=`<div class="empty-docs">Lỗi tải danh sách: ${e.message}</div>`;
  }
}

async function deleteDoc(docId, name){
  if(!confirm(`Xoá tài liệu "${name}"?`)) return;
  try{
    await fetch(`${API}/docs/${docId}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} });
    loadDocs();
  } catch(e){ alert('Xoá thất bại: '+e.message); }
}

// drag
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e=>e.preventDefault());

loadDocs();
</script>
</body>
</html>
